<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <head>
        <h1>Pesquisa Online</h1>

    </head>
    <section>
        <form action="" method="get">
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label for="userName">Nome </label>
                <input type="text" name="userName" required>
                <br>

                <label for="age">Idade</label>
                <input type="number" name="age" min="12" max="100" required>
                <br>

                <label for="birthDate">Data de nascimento</label>
                <input type="date" name="birthDate">
                <br>

                <label for="userEmail">Email</label>
                <input type="email" name="userEmail" required>
                <br>

                <label for="userNumberPhone">Numero de telefone</label>
                <input type="tel" name="userNumberPhone" pattern="[0-9{11}]"  placeholder="(DD)111111111">
                <br>

                <label for="file" accept="image/*">Upload de foto</label>
                <input type="file" accept="image/*" name="userImage">
                <br>
                
            </fieldset>

            <fieldset>
                <legend>Perfil</legend>

                <p>Genero:</p>

                <input type="radio" name="userGender" value="Feminino">
                <label for="userGender">Feminino</label>

                <input type="radio" name="userGender" value="Maculino">
                <label for="userGender">Masculino</label>

                <input type="radio" name="userGender" value="Não informar">
                <label for="userGender">Não informar</label>

            </fieldset>
            




            <button type="submit">Enviar</button>


    </section>
    
</body>
</html>
