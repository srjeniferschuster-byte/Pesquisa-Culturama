<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <head>
        <h1>Pesquisa Online</h1>

    </head>
    <section>
        <form action="" method="get">
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label for="userName">Nome </label>
                <input type="text" name="userName" required>
                <br>

                <label for="age">Idade</label>
                <input type="number" name="age" min="12" max="100" required>
                <br>

                <label for="birthDate">Data de nascimento</label>
                <input type="date" name="birthDate">
                <br>

                <label for="userEmail">Email</label>
                <input type="email" name="userEmail" required>
                <br>

                <label for="userNumberPhone">Numero de telefone</label>
                <input type="tel" name="userNumberPhone" pattern="[0-9{11}]"  placeholder="(DD)111111111">
                <br>

                <label for="file" accept="image/*">Upload de foto</label>
                <input type="file" accept="image/*" name="userImage">
                <br>
                
            </fieldset>

            <fieldset>
                <legend>Perfil</legend>

                <p>Genero:</p>

                <input type="radio" name="userGender" value="Feminino">
                <label for="userGender">Feminino</label>

                <input type="radio" name="userGender" value="Maculino">
                <label for="userGender">Masculino</label>

                <input type="radio" name="userGender" value="Não informar">
                <label for="userGender">Não informar</label>
                <br>

                <label for="maritalStatus">Estado civil:</label>
                <select name="maritalStatus" >
                    <option value="notInformed">Selecione</option>
                    <option value="Solteiro">Solteiro</option>
                    <option value="Casado">Casado</option>
                    <option value="Viuvo">Viuvo</option>
                    <option value="Divorciado">Divorciado</option>
                </select>
                <br>

                <label for="userCity">Estado</label>
                <select name="userCity">
                    <option value="notInformed">Selecione</option>
                    <option value="AC">AC</option>
                    <option value="AL">AL</option>
                    <option value="AP">AP</option>
                    <option value="AM">AM</option>
                    <option value="BA">BA</option>
                    <option value="CE">CE</option>
                    <option value="DF">DF</option>
                    <option value="ES">ES</option>
                    <option value="GO">GO</option>
                    <option value="MA">MA</option>
                    <option value="MS">MS</option>
                    <option value="MT">MT</option>
                    <option value="MG">MG</option>
                    <option value="PA">PA</option>
                    <option value="PB">PB</option>
                    <option value="PR">PR</option>
                    <option value="PE">PE</option>
                    <option value="PI">PI</option>
                    <option value="RJ">RJ</option>
                    <option value="RN">RN</option>
                    <option value="RS">RS</option>
                    <option value="RO">RO</option>
                    <option value="RR">RR</option>
                    <option value="SC">SC</option>
                    <option value="SP">SP</option>
                    <option value="SE">SE</option>
                    <option value="TO">TO</option>  
                </select>
                    

            </fieldset>
            




            <button type="submit">Enviar</button>


    </section>
    
</body>
</html>
